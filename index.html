<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos - Mulheres que Oram</title>
    
    <!-- Importando fontes elegantes do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f7f1f3; /* Fundo levemente acinzentado rosado */
            font-family: 'Montserrat', sans-serif;
            gap: 60px;
            padding: 40px;
        }

        .titulo-opcao {
            color: #7a5c66;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: -40px;
            font-weight: 400;
        }

        /* OPÇÃO 1: Formato Circular (Releitura do seu original) */
        .logo-1 {
            width: 280px;
            height: 280px;
            background-color: #fce8ee; /* Rosa pastel delicado */
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(200, 150, 160, 0.2);
            position: relative;
            transition: transform 0.3s ease;
        }

        .logo-1:hover {
            transform: translateY(-5px);
        }

        /* Círculo pontilhado interno */
        .logo-1::before {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            border: 1px dashed #dca8b8;
            border-radius: 50%;
        }

        .logo-1 .icone {
            width: 50px;
            height: 50px;
            margin-bottom: 15px;
            z-index: 1;
        }

        .logo-1 h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: #4a1525; /* Vinho / Bordô escuro */
            margin: 0;
            text-align: center;
            line-height: 1;
            z-index: 1;
            font-weight: 600;
        }

        .logo-1 span {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.8rem;
            color: #8c425c;
            z-index: 1;
            margin-top: 5px;
        }

        /* OPÇÃO 2: Minimalista, Clean e Moderna */
        .logo-2 {
            background-color: #ffffff;
            padding: 40px 80px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border-top: 4px solid #dca8b8;
            transition: transform 0.3s ease;
        }

        .logo-2:hover {
            transform: translateY(-5px);
        }

        .logo-2 .icone {
            width: 55px;
            height: 55px;
        }

        .logo-2 .texto {
            text-align: center;
            color: #3b1d26;
        }

        .logo-2 h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            margin: 0;
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="titulo-opcao">Opção 1: Estilo Selo (Clássica e Feminina)</div>
    
    <!-- Início da Logo 1 -->
    <div class="logo-1">
        <!-- Ícone SVG: Cruz delicada com ramos/folhas (florescendo) -->
        <svg class="icone" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 75 Q 35 60 40 45 Q 45 40 50 55" fill="#dca8b8" opacity="0.8"/>
            <path d="M50 65 Q 65 55 60 35 Q 55 30 50 45" fill="#dca8b8" opacity="0.8"/>
            <line x1="50" y1="15" x2="50" y2="85" stroke="#4a1525" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="30" y1="35" x2="70" y2="35" stroke="#4a1525" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        
        <h1>Mulheres</h1>
        <span>que Oram</span>
    </div>

    <div class="titulo-opcao">Opção 2: Minimalista (Ideal para estampar e Instagram)</div>
    
    <!-- Início da Logo 2 -->
    <div class="logo-2">
        <!-- Ícone SVG: Minimalista e elegante -->
        <svg class="icone" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke="#f0d5de" stroke-width="2"/>
            <path d="M50 25 L50 75 M35 40 L65 40" stroke="#8c425c" stroke-width="2.5" stroke-linecap="round"/>
        </svg>

        <div class="texto">
            <h1>Mulheres</h1>
            <h1><i style="color: #8c425c;">que Oram</i></h1>
        </div>
    </div>

</body>
</html>
