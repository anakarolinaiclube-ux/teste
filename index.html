<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ativação Diária - Dose de Motivação</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Nova Paleta de Cores: Dark Mode Enérgico */
            --bg-body: #0F172A;      /* Slate 900 */
            --bg-card: #1E293B;      /* Slate 800 */
            --bg-dark: #020617;      /* Slate 950 */
            --accent-main: #FF3366;  /* Vermelho/Rosa Energético */
            --text-main: #F8FAFC;    /* Quase Branco */
            --text-light: #94A3B8;   /* Slate 400 */
            --border-color: #334155; /* Slate 700 */
            --radius-lg: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- UI COMPONENTS --- */
        header { padding: 20px; text-align: center; }
        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; }
        .logo span { color: var(--accent-main); font-weight: 300; }

        .app-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .screen {
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden { display: none; opacity: 0; transform: translateY(20px); }
        .active { display: block; opacity: 1; transform: translateY(0); }

        /* --- INTRO SCREEN --- */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: var(--bg-card);
            color: var(--accent-main);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        h1 { font-size: 1.8rem; margin-bottom: 15px; line-height: 1.2; }
        .desc { color: var(--text-light); margin-bottom: 30px; font-size: 0.95rem; }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .meta-item { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }
        .meta-item i { color: var(--accent-main); margin-right: 5px; }

        .input-group { margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }
        input[type="text"]:focus { border-color: var(--accent-main); }

        .btn-start {
            width: 100%;
            padding: 18px;
            background: var(--accent-main);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }
        .btn-start:active { transform: scale(0.98); }
        .btn-start:hover { filter: brightness(1.1); }

        /* --- PLAYER SCREEN & ECG VISUALIZER --- */
        .visualizer {
            width: 100%;
            height: 140px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .ecg-wave {
            width: 120%;
            height: 100%;
            fill: none;
            stroke: var(--accent-main);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px var(--accent-main));
        }

        .ecg-wave polyline {
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            animation: ecg-draw 3s linear infinite;
        }

        @keyframes ecg-draw {
            0% { stroke-dashoffset: 800; }
            100% { stroke-dashoffset: 0; }
        }

        .user-greeting { font-weight: 600; margin-bottom: 10px; }
        .ai-quote { font-style: italic; color: var(--text-light); font-size: 0.95rem; margin-bottom: 30px; min-height: 3rem;}

        .player-controls {
            background: var(--bg-card);
            padding: 25px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--bg-body);
            border-radius: 3px;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-main);
            border-radius: 3px;
            position: relative;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: var(--accent-main);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: transform 0.2s, filter 0.3s;
        }
        .play-btn:hover { filter: brightness(1.1); transform: scale(1.05); }

        /* --- CTA BUTTON --- */
        .cta-container {
            margin-top: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            pointer-events: none;
        }
        .cta-container.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .btn-cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--text-main);
            text-decoration: none;
            border: 1px solid var(--accent-main);
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-cta:hover {
            background: var(--accent-main);
            color: white;
        }
        .btn-cta i { margin-right: 8px; }

        footer { padding: 20px; text-align: center; font-size: 0.7rem; color: var(--text-light); }

    </style>
</head>
<body>

    <header>
        <div class="logo">ACTIVA<span>.</span></div>
    </header>

    <main class="app-container">
        
        <!-- TELA 1: INTRO -->
        <section id="intro-screen" class="screen active">
            <span class="badge">Dose Diária</span>
            <h1>Ativação Mental</h1>
            <p class="desc">Prepare sua mente para vencer o dia com foco, energia e propósito inabaláveis.</p>
            
            <div class="meta-info">
                <span class="meta-item"><i class="far fa-clock"></i> 5 min</span>
                <span class="meta-item"><i class="fas fa-bolt"></i> Frequência Beta</span>
            </div>

            <div class="input-group">
                <input type="text" id="user-name" placeholder="Digite seu primeiro nome" autocomplete="off">
            </div>
            <button class="btn-start" onclick="startSession()">Ativar Minha Mente</button>
        </section>

        <!-- TELA 2: EXPERIÊNCIA -->
        <section id="experience-screen" class="screen hidden">
            
            <div class="visualizer">
                <!-- Onda Eletrocardiograma (ECG) animada -->
                <svg class="ecg-wave" preserveAspectRatio="none" viewBox="0 0 500 100">
                    <polyline points="0,50 150,50 160,30 170,80 185,10 200,90 215,30 225,50 350,50 360,30 370,80 385,10 400,90 415,30 425,50 500,50" />
                </svg>
            </div>
            
            <h2 class="user-greeting" id="greeting-text">Conectando...</h2>
            <p class="ai-quote" id="ai-quote">"Sintonizando sua frequência..."</p>

            <div class="player-controls">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">00:00</span>
                    <span id="total-time">--:--</span>
                </div>
                <button class="play-btn" id="play-pause">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
            </div>

            <!-- BOTÃO CTA (Exibido ao final do áudio) -->
            <div id="cta-container" class="cta-container">
                <a href="https://wa.me/?text=Acabei%20de%20escutar%20minha%20ativa%C3%A7%C3%A3o%20di%C3%A1ria.%20Escute%20a%20sua%20tamb%C3%A9m!" target="_blank" class="btn-cta">
                    <i class="fas fa-share-alt"></i> Compartilhar minha dose
                </a>
            </div>
        </section>

    </main>

    <footer>
        &copy; 2026 Plataforma Activa. Tecnologia de Ativação Subconsciente.
    </footer>

    <script>
        // Placeholder de áudio fixo (para alterar no futuro, troque o link abaixo)
        const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        let isPlaying = false;
        let ttsCompleted = false;

        // Pré-carrega vozes para evitar delay em alguns navegadores
        if(window.speechSynthesis) window.speechSynthesis.getVoices();

        audio.addEventListener('loadedmetadata', () => {
            let mins = Math.floor(audio.duration / 60);
            let secs = Math.floor(audio.duration % 60);
            document.getElementById('total-time').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        });

        async function startSession() {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("Por favor, digite seu nome.");

            // Transição
            document.getElementById('intro-screen').classList.remove('active');
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('experience-screen').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('experience-screen').classList.add('active');
                }, 50);
            }, 600);

            document.getElementById('greeting-text').innerText = `Ativação de ${name}`;

            let quoteText = "";
            try {
                // Fetch na nossa API para buscar a frase enérgica
                const response = await fetch(`/api/welcome?name=${encodeURIComponent(name)}`);
                const data = await response.json();
                quoteText = data.quote;
            } catch (e) {
                // Fallback offline
                quoteText = `${name}, segue sua dose diária de motivação. Preste bastante atenção.`;
            }
            
            document.getElementById('ai-quote').innerText = `"${quoteText}"`;

            // Dispara o áudio inicial personalizado com nome (Text-to-Speech nativo)
            playIntroSpeech(quoteText);
        }

        // Função do Áudio Inicial Personalizado (Voz do Navegador)
        function playIntroSpeech(text) {
            if (!window.speechSynthesis) {
                // Se o navegador não suporta, pula direto pro áudio fixo
                startMainAudio();
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.95; // Velocidade ligeiramente menor para impacto emocional
            
            utterance.onend = () => {
                ttsCompleted = true;
                startMainAudio(); // Ao terminar a fala, entra a música/áudio fixo
            };

            utterance.onerror = () => {
                ttsCompleted = true;
                startMainAudio();
            };

            window.speechSynthesis.speak(utterance);
        }

        // Inicia o áudio fixo
        function startMainAudio() {
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('play-icon').classList.replace('fa-play', 'fa-pause');
            }).catch(err => {
                console.log("Autoplay bloqueado pelo navegador. Aguardando interação no botão.", err);
            });
        }

        // Lógica dos Controles do Player
        const playBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');

        playBtn.addEventListener('click', () => {
            // Cancela a voz TTS se o usuário clicar no botão de play/pause no meio da fala
            if (!ttsCompleted && window.speechSynthesis) {
                window.speechSynthesis.cancel();
                ttsCompleted = true;
            }

            if (isPlaying) {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
            } else {
                audio.play();
                playIcon.classList.replace('fa-play', 'fa-pause');
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            if(!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent}%`;
            
            let mins = Math.floor(audio.currentTime / 60);
            let secs = Math.floor(audio.currentTime % 60);
            currentTimeEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        });

        document.getElementById('progress-container').addEventListener('click', (e) => {
            const width = e.currentTarget.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        });

        // Revela o Botão de Compartilhar CTA quando o áudio termina
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.classList.replace('fa-pause', 'fa-play');
            
            const ctaContainer = document.getElementById('cta-container');
            ctaContainer.classList.add('visible');
        });

    </script>
</body>
</html>
